#========================================================================
# ~/.config/picom.conf — Effets bureau Hybryde
#========================================================================

# ── Backend ──────────────────────────────────────────────────────────────
# "glx" pour effets avancés (blur, meilleures perfs GPU)
# "xrender" si glx pose problème en VirtualBox
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# ── Ombres ───────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;

# Exclure certaines fenêtres des ombres
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Cairo-dock'",
    "class_g = 'cairo-dock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fondu (animations ouverture/fermeture) ────────────────────────────────
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

fade-exclude = [
    "class_g = 'Cairo-dock'",
    "class_g = 'cairo-dock'"
];

# ── Transparence ──────────────────────────────────────────────────────────
# Fenêtres inactives légèrement transparentes
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'Cairo-dock'",
    "100:class_g = 'cairo-dock'",
    "90:class_g = 'Thunar'",
    "95:class_g = 'Gedit'"
];

# ── Flou d'arrière-plan ────────────────────────────────────────────────────
# (nécessite backend glx)
blur-background = false;   # Mettre true pour activer
blur-method = "dual_kawase";
blur-strength = 5;

blur-background-exclude = [
    "class_g = 'Cairo-dock'",
    "class_g = 'cairo-dock'"
];

# ── Coins arrondis ─────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'Cairo-dock'",
    "class_g = 'cairo-dock'",
    "window_type = 'dock'"
];

# ── Divers ─────────────────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
vsync = true;
dbe = false;
unredir-if-possible = false;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
log-level = "warn";
